services:
  - type: web
    name: retention-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /Retention-AI/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_BASE_PATH
        value: /Retention-AI
      - key: API_V1_STR
        value: /api/v1
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 120
      - key: MODEL_DIR
        value: backend/models
      - key: FORCE_HTTPS
        value: "True"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
